<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Impact - Auto Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dossier-container">
        <header class="dossier-header">
            <div class="header-top">
                <span class="classification" id="version-display">STINK LOG // v1.8.0</span>
                <span class="case-number">CASE: BARKING-RIVERSIDE</span>
            </div>
            <h1>Dashboard</h1>
        </header>

        <main class="dashboard-main" style="padding: 0; margin-top: 2rem;">
            <p class="subject">COMMUNITY MONITORING</p>

            <section class="terminal-feed">
                <div class="terminal-line">
                    <span class="label">> USERS_ACTIVE:</span>
                    <span class="value" id="val-users">--</span>
                    <span class="cursor">_</span>
                </div>
                <div class="terminal-line">
                    <span class="label">> INCIDENTS_LOGGED:</span>
                    <span class="value" id="val-incidents">--</span>
                    <span class="cursor">_</span>
                </div>
                <div class="terminal-line">
                    <span class="label">> FORMS_SUBMITTED:</span>
                    <span class="value" id="val-forms">--</span>
                    <span class="cursor">_</span>
                </div>
            </section>

            <section class="chart-section" style="margin-top: 2rem; border: 1px solid #00ff00; padding: 1rem;">
                <h2 style="color: #00ff00; font-size: 1.2rem; border-bottom: 1px solid #00ff00; padding-bottom: 0.5rem; margin-bottom: 1rem; font-family: 'IBM Plex Mono', monospace;">> WEEKLY_SMELL_BREAKDOWN</h2>
                <canvas id="weeklySmellChart" style="max-height: 300px;"></canvas>
            </section>
            
            <div id="dashboard-error" class="error-message terminal-error" style="display: none;">
                [ERR_CONNECTION_FAILED] - RETRYING...
            </div>

            <!-- History Log - public submission log, shown once the visitor has data locally -->
            <section class="history-section" id="history-section" style="display:none;">
                <h2>&gt; SUBMISSION_LOG</h2>
                <!-- Mobile cards (default, <640px) -->
                <div class="history-cards" id="history-cards" aria-label="Submission history list"></div>
                <!-- Desktop table (≥640px) -->
                <div class="history-table-wrap">
                    <table class="history-table" id="history-table" aria-label="Submission history table">
                        <thead>
                            <tr>
                                <th class="col-date">Date / Time</th>
                                <th>Smell Type</th>
                                <th>Location</th>
                                <th>Gov.UK</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody"></tbody>
                    </table>
                </div>
                <p class="history-empty" id="history-empty" style="display:none;">[NO_SUBMISSIONS_FOUND]</p>
            </section>
        </main>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let weeklySmellChartInstance = null;

        async function fetchStats() {
            try {
                const response = await fetch('/api/dashboard-stats');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                animateValue('val-users', 0, data.users, 1500);
                animateValue('val-incidents', 0, data.incidents, 1500);
                animateValue('val-forms', 0, data.formsSubmitted, 1500);
            } catch (error) {
                console.error('Error fetching dashboard stats:', error);
                document.getElementById('dashboard-error').style.display = 'block';
            }
        }

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Ease out quad
                const easeOut = progress * (2 - progress);
                obj.innerHTML = Math.floor(easeOut * (end - start) + start).toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = end.toLocaleString();
                }
            };
            window.requestAnimationFrame(step);
        }

        async function fetchWeeklyChart() {
            try {
                const response = await fetch('/api/smell-stats-weekly');
                if (!response.ok) throw new Error('Failed to fetch chart data');
                const data = await response.json();

                // Assign colors dynamically to datasets
                const colors = ['#00ff00', '#00cccc', '#cc00cc', '#cccc00', '#0000cc'];
                data.datasets.forEach((dataset, index) => {
                    const color = colors[index % colors.length];
                    dataset.backgroundColor = color + '80'; // 50% opacity
                    dataset.borderColor = color;
                    dataset.borderWidth = 1;
                });

                const ctx = document.getElementById('weeklySmellChart').getContext('2d');
                if (weeklySmellChartInstance) {
                    weeklySmellChartInstance.destroy();
                }
                weeklySmellChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: data,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                stacked: false,
                                grid: { color: '#333333' },
                                ticks: { color: '#00ff00', font: { family: "'IBM Plex Mono', monospace" } }
                            },
                            y: {
                                stacked: false,
                                beginAtZero: true,
                                grid: { color: '#333333' },
                                ticks: { stepSize: 1, color: '#00ff00', font: { family: "'IBM Plex Mono', monospace" } }
                            }
                        },
                        plugins: {
                            legend: {
                                labels: { color: '#00ff00', font: { family: "'IBM Plex Mono', monospace" } }
                            },
                            tooltip: {
                                backgroundColor: '#000000',
                                titleColor: '#00ff00',
                                bodyColor: '#00ff00',
                                borderColor: '#00ff00',
                                borderWidth: 1,
                                titleFont: { family: "'IBM Plex Mono', monospace" },
                                bodyFont: { family: "'IBM Plex Mono', monospace" }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error fetching chart:', error);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function fetchHistory() {
            const dataStr = localStorage.getItem('freshAirWatchData_v2') || localStorage.getItem('freshAirWatchData');
            if (!dataStr) return;

            const section = document.getElementById('history-section');
            section.style.display = '';

            try {
                const res = await fetch('/api/history');
                if (!res.ok) throw new Error('Failed to fetch history');
                const { reports } = await res.json();

                const tbody = document.getElementById('history-tbody');
                const cards = document.getElementById('history-cards');
                const empty = document.getElementById('history-empty');

                if (!reports || reports.length === 0) {
                    empty.style.display = '';
                    return;
                }

                reports.forEach(r => {
                    const date = new Date(r.submittedAt);
                    const dateStr = date.toLocaleDateString('en-GB', { timeZone: 'Europe/London', day: 'numeric', month: 'short', year: '2-digit' });
                    const timeStr = date.toLocaleTimeString('en-GB', { timeZone: 'Europe/London', hour: '2-digit', minute: '2-digit' });
                    const dateLabel = `${dateStr} ${timeStr}`;
                    const isSubmitted = r.govUkStatus === 'submitted';
                    const badgeClass = isSubmitted ? 'history-badge--submitted' : 'history-badge--not-submitted';
                    const badgeText = isSubmitted ? '\u2713 Submitted' : '\u2717 Not Submitted';

                    // Table row (desktop)
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="col-date">${dateLabel}</td>
                        <td>${escapeHtml(r.smellType)}</td>
                        <td>${escapeHtml(r.businessLocation)}</td>
                        <td><span class="history-badge ${badgeClass}">${badgeText}</span></td>
                    `;
                    tbody.appendChild(tr);

                    // Mobile card
                    const card = document.createElement('div');
                    card.className = 'history-card';
                    card.innerHTML = `
                        <div class="history-card__header">
                            <span class="history-card__date">${dateLabel}</span>
                            <span class="history-badge ${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="history-card__body">
                            <span class="history-card__label">Smell</span>
                            <span class="history-card__value">${escapeHtml(r.smellType)}</span>
                            <span class="history-card__label">Location</span>
                            <span class="history-card__value">${escapeHtml(r.businessLocation)}</span>
                        </div>
                    `;
                    cards.appendChild(card);
                });
            } catch (err) {
                console.error('Error fetching history:', err);
            }
        }

        document.addEventListener('DOMContentLoaded', () => { fetchStats(); fetchWeeklyChart(); fetchHistory(); });
    </script>
    <script defer src="/nav.js"></script>
</body>
</html>
